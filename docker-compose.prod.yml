version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: efc-api
    restart: unless-stopped
    environment:
      PORT: 3002
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "3002:3002"
    volumes:
      - ./api/prisma:/app/prisma
      - ./api/uploads:/app/uploads
      - ./api/data:/app/data

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
    container_name: efc-portal
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: 3000
    ports:
      - "3000:3000"

